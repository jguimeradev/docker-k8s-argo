apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: docker-backend_service:latest  
          imagePullPolicy: Never
          ports:
            - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: backend        # this is the DNS name frontend uses
spec:
  selector:
    app: backend
  ports:
    - port: 3000
      targetPort: 3000
  # type defaults to ClusterIP — not reachable from outside